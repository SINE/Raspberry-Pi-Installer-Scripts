# Repository Security Scan Workflow
# Implements the staged scanning plan from PlanV1.txt.
#
# Execution model:
#   - Never installs or executes the repository's own dependencies.
#   - All scanning tools run in isolated Docker containers.
#   - The repository is always mounted :ro (read-only).
#   - Network is disabled (--network none) for all containers that
#     touch repo files to prevent exfiltration by any embedded payload.
#
# Scan scope:
#   push / pull_request  → scoped: only files changed in the commit or PR
#                          are passed to BiDi grep and malcontent.
#                          OSV-Scanner and pip-audit run only when a
#                          manifest/lockfile is among the changed files.
#   workflow_dispatch    → full: entire repository scanned (manual run).
#   schedule             → full: entire repository scanned (weekly cron).
#   Falls back to full scan on the first push to a new branch.
#
# Stages covered:
#   Stage 0: Ecosystem triage (bash, no external tools)
#   Stage 1: Unicode BiDi / Trojan Source detection (grep)
#   Stage 2a: Python dep inference via pipreqs (when no manifest exists)
#   Stage 2b: OSV-Scanner — CVE matching on lockfiles/manifests
#   Stage 2c: pip-audit — CVE matching via PyPI Advisory Database
#   Stage 3+: malcontent — full behavioral scan (14,500+ YARA rules)
#
# GitHub Security tab integration:
#   Every stage produces a SARIF 2.1.0 file that is uploaded via
#   github/codeql-action/upload-sarif to populate the Security tab.
#   Each tool uses a distinct 'category' so results don't overwrite each
#   other.  All upload steps run with 'if: always()' so reports appear
#   even when the job fails or the CI gate trips.
#
#   Tools → Security tab categories:
#     trojan-source  — Stage 1 BiDi/Trojan-Source findings
#     osv-scanner    — Stage 2b CVE findings from OSV-Scanner
#     pip-audit      — Stage 2c CVE findings from pip-audit (PyPI Advisory DB)
#     malcontent     — Stage 3 behavioral findings from malcontent
#
# Action SHA pinning:
#   All 'uses:' references below MUST be pinned to a commit SHA in
#   production. Mutable tags (v4, v3, etc.) can be silently replaced.
#   Verify current SHAs at:
#     https://github.com/actions/checkout/releases
#     https://github.com/actions/upload-artifact/releases
#     https://github.com/github/codeql-action/releases
#   Use 'pin-github-action' (https://github.com/mheap/pin-github-action)
#   or actionlint to automate pinning.
#
#   Shown:
#     actions/checkout            v4.2.2  = 11bd71901bbe5b1630ceea73d27597364c9af683
#     actions/upload-artifact     v4      = (verify at releases page before using)
#     github/codeql-action/upload-sarif v4 = (verify at releases page before using)

name: Repository Security Scan

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:
#  schedule:
#    - cron: "0 4 * * 1"   # Every Monday at 04:00 UTC — full scan

# Declare minimum required permissions. Never use 'write-all'.
permissions:
  contents: read

jobs:
  security-scan:
    name: Behavioral and supply-chain scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write    # required for upload-sarif to post to Security tab

    steps:

      # ----------------------------------------------------------------
      # CHECKOUT
      # Pin to commit SHA — never a mutable tag.
      # See pinning note at top of file.
      # ----------------------------------------------------------------
      - name: Checkout repository
        # REPLACE the tag below with the verified commit SHA.
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0    # full history; required if mal diff is added later

      # ----------------------------------------------------------------
      # SCOPE DETECTION
      # Determines whether to scan the whole repository (full) or only the
      # files changed in this push/PR (scoped).
      #
      # Scan mode by trigger:
      #   push / pull_request  → scoped (changed, still-existing files only)
      #   workflow_dispatch    → full (manual run)
      #   schedule             → full (weekly cron)
      #
      # Falls back to full when:
      #   - First push to a branch (before SHA is all-zeros)
      #   - git diff returns no surviving files
      #
      # Outputs (steps.scope.outputs.*):
      #   scan_mode         — "full" or "scoped"
      #   manifests_changed — "true" if requirements*.txt / pyproject.toml /
      #                       poetry.lock / uv.lock / Pipfile.lock changed
      #
      # Side effects:
      #   /tmp/scan-scope/changed_files.txt — repo-relative path per line;
      #     empty for full-scan mode.
      #   /tmp/sarif/*.sarif stubs — empty valid SARIF 2.1.0 pre-created so
      #     upload steps never fail when a scan stage is skipped.
      # ----------------------------------------------------------------
      - name: Determine scan scope
        id: scope
        env:
          GH_EVENT_NAME:   ${{ github.event_name }}
          GH_EVENT_BEFORE: ${{ github.event.before }}
          GH_SHA:          ${{ github.sha }}
          GH_BASE_REF:     ${{ github.base_ref }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/scan-scope /tmp/sarif /tmp/malcontent-output

          # Pre-create empty SARIF stubs so upload steps never fail when a
          # scan stage is skipped in scoped mode.
          _EMPTY_SARIF='{"version":"2.1.0","$schema":"https://json.schemastore.org/sarif-2.1.0.json","runs":[{"tool":{"driver":{"name":"placeholder","rules":[]}},"results":[]}]}'
          for _TOOL in trojan-source osv-scanner pip-audit malcontent-full malcontent-gate; do
            echo "$_EMPTY_SARIF" > "/tmp/sarif/${_TOOL}.sarif"
          done

          # Stub malcontent JSON outputs (converter expects valid JSON).
          echo '{"Files":{}}' > /tmp/malcontent-output/full-analysis.json
          echo '{"Files":{}}' > /tmp/malcontent-output/gate-critical.json

          touch /tmp/scan-scope/changed_files.txt
          SCAN_MODE="full"

          if [[ "$GH_EVENT_NAME" == "push" || "$GH_EVENT_NAME" == "pull_request" ]]; then
            _RAW=/tmp/scan-scope/raw.txt
            if [[ "$GH_EVENT_NAME" == "pull_request" ]]; then
              git diff --name-only "origin/${GH_BASE_REF}...HEAD" \
                > "$_RAW" 2>/dev/null || true
            else
              if [[ "$GH_EVENT_BEFORE" == "0000000000000000000000000000000000000000" ]]; then
                echo "First push to branch — using full scan."
              else
                git diff --name-only "$GH_EVENT_BEFORE" "$GH_SHA" \
                  > "$_RAW" 2>/dev/null || true
              fi
            fi

            if [[ -f "$_RAW" ]]; then
              # Keep only files that still exist (deleted files irrelevant).
              while IFS= read -r _F; do
                [[ -f "$_F" ]] && echo "$_F"
              done < "$_RAW" > /tmp/scan-scope/changed_files.txt || true

              _COUNT=$(wc -l < /tmp/scan-scope/changed_files.txt | tr -d ' ')
              if [[ "$_COUNT" -gt 0 ]]; then
                SCAN_MODE="scoped"
                echo "Scoped scan: $_COUNT changed file(s):"
                cat /tmp/scan-scope/changed_files.txt
              else
                echo "No surviving changed files — falling back to full scan."
              fi
            fi
          else
            echo "Trigger '$GH_EVENT_NAME' — full scan."
          fi

          # Detect manifest/lockfile changes (gates OSV-Scanner and pip-audit).
          MANIFESTS_CHANGED="false"
          if [[ "$SCAN_MODE" == "scoped" ]]; then
            if grep -qE '(^|/)requirements[^/]*\.txt$|(^|/)pyproject\.toml$|(^|/)poetry\.lock$|(^|/)uv\.lock$|(^|/)Pipfile\.lock$' \
                 /tmp/scan-scope/changed_files.txt 2>/dev/null; then
              MANIFESTS_CHANGED="true"
            fi
          fi

          {
            echo "scan_mode=$SCAN_MODE"
            echo "manifests_changed=$MANIFESTS_CHANGED"
          } >> "$GITHUB_OUTPUT"

          echo ""
          echo "=== Scan scope summary ==="
          echo "  Event:             $GH_EVENT_NAME"
          echo "  Mode:              $SCAN_MODE"
          echo "  Manifests changed: $MANIFESTS_CHANGED"

      # ----------------------------------------------------------------
      # STAGE 0 — Ecosystem triage
      # Determines what manifests/lockfiles/languages are present.
      # Nothing from the repository is executed here.
      # ----------------------------------------------------------------
      - name: Ecosystem triage
        id: triage
        shell: bash
        run: |
          set -euo pipefail

          # Returns "true" if any file matching $1 exists under the current
          # directory, excluding .git and node_modules.
          detect() {
            if find . -maxdepth 4 -name "$1" \
                 -not -path "./.git/*" \
                 -not -path "*/node_modules/*" \
                 2>/dev/null | grep -q .; then
              echo "true"
            else
              echo "false"
            fi
          }

          # Python
          HAS_PY_FILES=$(
            if find . -maxdepth 5 -name "*.py" \
                 -not -path "./.git/*" \
                 -not -path "*/__pycache__/*" \
                 2>/dev/null | grep -q .; then
              echo "true"
            else
              echo "false"
            fi
          )
          HAS_REQUIREMENTS=$(detect "requirements*.txt")
          HAS_PYPROJECT=$(detect "pyproject.toml")
          HAS_POETRY_LOCK=$(detect "poetry.lock")
          HAS_UV_LOCK=$(detect "uv.lock")
          HAS_PDM_LOCK=$(detect "pdm.lock")
          HAS_PIPFILE_LOCK=$(detect "Pipfile.lock")
          HAS_SETUP_PY=$(detect "setup.py")
          HAS_SETUP_CFG=$(detect "setup.cfg")

          # Node / JS
          HAS_PACKAGE_JSON=$(detect "package.json")
          HAS_PACKAGE_LOCK=$(detect "package-lock.json")
          HAS_YARN_LOCK=$(detect "yarn.lock")
          HAS_PNPM_LOCK=$(detect "pnpm-lock.yaml")
          HAS_BUN_LOCK=$(detect "bun.lock")

          # Other ecosystems
          HAS_GO_MOD=$(detect "go.mod")
          HAS_CARGO_TOML=$(detect "Cargo.toml")

          # CI/CD
          HAS_GHA=$(
            if find .github/workflows -maxdepth 1 \
                 \( -name "*.yml" -o -name "*.yaml" \) \
                 2>/dev/null | grep -q .; then
              echo "true"
            else
              echo "false"
            fi
          )

          # pipreqs is needed when Python files exist but no Python manifest
          # or lockfile of any kind is present. All conditions must be false.
          NEEDS_PIPREQS=false
          if [[ "$HAS_PY_FILES"     == "true"  ]] &&
             [[ "$HAS_REQUIREMENTS" == "false" ]] &&
             [[ "$HAS_PYPROJECT"    == "false" ]] &&
             [[ "$HAS_POETRY_LOCK"  == "false" ]] &&
             [[ "$HAS_UV_LOCK"      == "false" ]] &&
             [[ "$HAS_PDM_LOCK"     == "false" ]] &&
             [[ "$HAS_PIPFILE_LOCK" == "false" ]] &&
             [[ "$HAS_SETUP_PY"     == "false" ]] &&
             [[ "$HAS_SETUP_CFG"    == "false" ]]; then
            NEEDS_PIPREQS=true
          fi

          {
            echo "has_py_files=$HAS_PY_FILES"
            echo "has_requirements=$HAS_REQUIREMENTS"
            echo "has_pyproject=$HAS_PYPROJECT"
            echo "has_poetry_lock=$HAS_POETRY_LOCK"
            echo "has_uv_lock=$HAS_UV_LOCK"
            echo "has_package_json=$HAS_PACKAGE_JSON"
            echo "has_package_lock=$HAS_PACKAGE_LOCK"
            echo "has_yarn_lock=$HAS_YARN_LOCK"
            echo "has_pnpm_lock=$HAS_PNPM_LOCK"
            echo "has_bun_lock=$HAS_BUN_LOCK"
            echo "has_go_mod=$HAS_GO_MOD"
            echo "has_cargo_toml=$HAS_CARGO_TOML"
            echo "has_gha=$HAS_GHA"
            echo "needs_pipreqs=$NEEDS_PIPREQS"
          } >> "$GITHUB_OUTPUT"

          echo "=== Ecosystem triage ==="
          echo "  Python files:         $HAS_PY_FILES"
          echo "  requirements*.txt:    $HAS_REQUIREMENTS"
          echo "  pyproject.toml:       $HAS_PYPROJECT"
          echo "  poetry/uv/pdm lock:   $HAS_POETRY_LOCK / $HAS_UV_LOCK / $HAS_PDM_LOCK"
          echo "  package.json:         $HAS_PACKAGE_JSON"
          echo "  go.mod:               $HAS_GO_MOD"
          echo "  Cargo.toml:           $HAS_CARGO_TOML"
          echo "  GHA workflows:        $HAS_GHA"
          echo "  Needs pipreqs:        $NEEDS_PIPREQS"

      # ----------------------------------------------------------------
      # STAGE 1 — Trojan Source (CVE-2021-42574): BiDi control characters
      #
      # Detects Unicode bidirectional override/embedding characters that
      # produce visually misleading code without changing how compilers
      # parse it. No external tool required — GNU grep with PCRE (-P).
      #
      # SARIF output: findings are written to
      #   /tmp/sarif/trojan-source.sarif
      # and uploaded to the Security tab via upload-sarif regardless of
      # whether hits were found (an empty results array is valid SARIF
      # and allows the tool to appear as "passing" in the Security tab).
      # ----------------------------------------------------------------
      - name: Trojan Source / BiDi detection
        id: bidi
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/sarif

          _BIDI_PAT="[\x{200b}\x{200e}\x{200f}\x{202a}-\x{202e}\x{2066}-\x{2069}\x{feff}\x{00ad}]"
          if [[ "${{ steps.scope.outputs.scan_mode }}" == "scoped" && \
                -s /tmp/scan-scope/changed_files.txt ]]; then
            # Scoped: grep only the changed, surviving files.
            # No --include filters needed — the list is already the full target.
            mapfile -t _CHANGED < /tmp/scan-scope/changed_files.txt
            if [[ "${#_CHANGED[@]}" -gt 0 ]]; then
              HITS=$(grep -Pl "$_BIDI_PAT" "${_CHANGED[@]}" 2>/dev/null || true)
            else
              HITS=""
            fi
          else
            # Full: grep entire repository tree.
            HITS=$(grep -rPl "$_BIDI_PAT" \
              --include="*.py"    --include="*.js"     --include="*.ts"  \
              --include="*.tsx"   --include="*.jsx"    --include="*.go"  \
              --include="*.rs"    --include="*.java"   --include="*.kt"  \
              --include="*.c"     --include="*.cpp"    --include="*.h"   \
              --include="*.hpp"   --include="*.cs"     --include="*.sh"  \
              --include="*.bash"  --include="*.yaml"   --include="*.yml" \
              --include="*.rb"    --include="*.php"    --include="*.swift" \
              --include="*.scala" --include="*.pl"     --include="*.lua" \
              . 2>/dev/null || true)
          fi

          # Build SARIF 2.1.0.  One result per affected file.
          # Script is in .github/scripts/ to avoid YAML heredoc indentation issues.
          python3 .github/scripts/bidi_sarif.py "$HITS"

      - name: Upload Trojan Source SARIF to Security tab
        if: always()
        # REPLACE with verified commit SHA — see pinning note at top.
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: /tmp/sarif/trojan-source.sarif
          category: trojan-source

      # ----------------------------------------------------------------
      # STAGE 2a/pre — Python dependency inference via pipreqs
      #
      # Runs ONLY when Python files exist but NO Python manifest or lockfile
      # is found (triage step sets needs_pipreqs=true).
      #
      # Approach validation:
      #   pipreqs performs AST-level static import analysis. It reads Python
      #   source files and extracts `import foo` and `from foo import bar`
      #   statements without executing any code.
      #
      #   It runs inside a python:3.12-slim container. The repository is
      #   mounted read-only (:ro). Network is enabled only to let pip fetch
      #   pipreqs from PyPI; the container never executes repository code,
      #   so network access from the repo itself is not possible here.
      #
      #   Limitation: static imports only. The following patterns are NOT
      #   detected by pipreqs:
      #     __import__("foo")
      #     importlib.import_module("foo")
      #     String-based or conditional dynamic imports
      #   These patterns are intentional obfuscation and will be caught by
      #   malcontent's behavioral YARA rules in Stage 3.
      #
      #   Alternatives considered and rejected for this specific gap:
      #     uv pip compile  — requires an existing manifest (pyproject.toml or
      #                       requirements.in) to compile from. Not applicable.
      #     deptry          — detects unused/missing deps but does not produce
      #                       a scannable lockfile format.
      #     importlab       — Google's static analysis tool; similar scope to
      #                       pipreqs but less widely used and harder to invoke.
      #
      #   Conclusion: pipreqs is the correct tool for this specific gap.
      #   pipreqs==0.4.13 is the version listed in PlanV1.txt.
      #
      #   Output → /tmp/scan-deps/inferred_requirements.txt
      #           → consumed by OSV-Scanner in the next step.
      # ----------------------------------------------------------------
      - name: Infer Python dependencies via pipreqs (no manifest found)
        if: steps.triage.outputs.needs_pipreqs == 'true'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/scan-deps

          echo "=== pipreqs: static AST import analysis — no repo code executed ==="

          docker run --rm \
            -v "${{ github.workspace }}:/repo:ro" \
            python:3.12-slim \
            sh -c "pip install 'pipreqs==0.4.13' \
                       --quiet \
                       --no-cache-dir \
                       --index-url https://pypi.org/simple/ \
                       2>/dev/null && \
                   pipreqs /repo --print --ignore-errors 2>/dev/null" \
            > /tmp/scan-deps/inferred_requirements.txt || true

          if [[ -s /tmp/scan-deps/inferred_requirements.txt ]]; then
            COUNT=$(wc -l < /tmp/scan-deps/inferred_requirements.txt)
            echo "Inferred $COUNT package(s):"
            cat /tmp/scan-deps/inferred_requirements.txt
          else
            echo "pipreqs: no third-party imports found (stdlib-only or no .py source files detected)."
          fi

      # ----------------------------------------------------------------
      # STAGE 2b — OSV-Scanner: CVE matching on all manifests/lockfiles
      #
      # osv-scanner --recursive auto-detects all supported manifests in
      # the directory tree. If pipreqs ran and produced output, the
      # inferred requirements file is added as an additional lockfile.
      #
      # Supported manifests auto-detected by --recursive:
      #   Python: requirements*.txt, pyproject.toml, poetry.lock,
      #           Pipfile.lock, uv.lock, pdm.lock, pylock.toml
      #   Node:   package-lock.json, yarn.lock, pnpm-lock.yaml, bun.lock
      #   Go:     go.mod
      #   Rust:   Cargo.lock
      #   Java:   pom.xml, build.gradle (with maven/gradle lockfile)
      #   And more — see https://google.github.io/osv-scanner/supported-languages-and-lockfiles/
      #
      # Two output passes:
      #   1. --format sarif → /tmp/sarif/osv-scanner.sarif (Security tab)
      #   2. --format table → terminal (human-readable log)
      #
      # Exit code 1 from OSV-Scanner means vulnerabilities were found.
      # Both passes use '|| true' so findings are informational by default
      # and don't block CI.  Remove '|| true' to fail CI on any CVE.
      # The SARIF upload step runs with 'if: always()' so the Security
      # tab is populated regardless.
      # ----------------------------------------------------------------
      - name: OSV-Scanner — dependency CVE check
        if: steps.scope.outputs.scan_mode == 'full' || steps.scope.outputs.manifests_changed == 'true'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/scan-deps /tmp/sarif

          # Build extra args dynamically: add inferred requirements if present.
          EXTRA_LOCKFILE_ARGS=()
          if [[ -s /tmp/scan-deps/inferred_requirements.txt ]]; then
            echo "Including inferred requirements in OSV scan."
            EXTRA_LOCKFILE_ARGS=(
              "--lockfile"
              "requirements.txt:/tmp/scan-deps/inferred_requirements.txt"
            )
          fi

          echo "=== OSV-Scanner pass 1: SARIF output (for Security tab) ==="
          docker run --rm \
            -v "${{ github.workspace }}:/repo:ro" \
            -v "/tmp/scan-deps:/tmp/scan-deps:ro" \
            ghcr.io/google/osv-scanner:latest \
            scan \
            --recursive \
            --format sarif \
            "${EXTRA_LOCKFILE_ARGS[@]}" \
            /repo \
            > /tmp/sarif/osv-scanner.sarif || true
          # '|| true': exit code 1 = vulns found; don't abort — SARIF is
          # still written and will be uploaded to the Security tab.

          echo ""
          echo "=== OSV-Scanner pass 2: table summary (human-readable log) ==="
          docker run --rm \
            -v "${{ github.workspace }}:/repo:ro" \
            -v "/tmp/scan-deps:/tmp/scan-deps:ro" \
            ghcr.io/google/osv-scanner:latest \
            scan \
            --recursive \
            --format table \
            "${EXTRA_LOCKFILE_ARGS[@]}" \
            /repo || true

      - name: Upload OSV-Scanner SARIF to Security tab
        if: always()
        # REPLACE with verified commit SHA — see pinning note at top.
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: /tmp/sarif/osv-scanner.sarif
          category: osv-scanner

      # ----------------------------------------------------------------
      # STAGE 2c — pip-audit: CVE matching via PyPI Advisory Database
      #
      # pip-audit is the official PyPA vulnerability scanner. It queries
      # the PyPI Advisory Database (which is itself backed by OSV) and
      # provides a complementary second opinion to OSV-Scanner with
      # pip-native version resolution.
      #
      # Design constraints respected:
      #   - The repo is mounted :ro — no repo code is executed.
      #   - pip-audit resolves package versions via pip's resolver but
      #     does not install packages into any runtime environment.
      #   - --no-deps limits the audit to explicitly listed packages
      #     only (requirements.txt already enumerates everything).
      #   - Network is required: pip-audit must reach PyPI to resolve
      #     version ranges (e.g., Pillow>=12.2.0) and query the
      #     advisory database. This is equivalent to OSV-Scanner's
      #     network usage and does not touch repo files.
      #
      # Packages audited (mirrors requirements.txt):
      #   [A] Script-runner:  adafruit-python-shell, click
      #   [B] Runtime pip:    adafruit-blinka,
      #                       adafruit-circuitpython-rgb-display, spidev
      #   [C] Runtime apt:    Pillow>=12.2.0, numpy
      #
      # Two output passes:
      #   1. --format sarif  → /tmp/sarif/pip-audit.sarif (Security tab)
      #   2. --format columns → terminal (human-readable log)
      #
      # Exit code 1 from pip-audit means vulnerabilities were found.
      # Both passes use '|| true' so findings are informational and do
      # not block CI. Remove '|| true' to enforce a hard gate.
      # ----------------------------------------------------------------
      - name: pip-audit — Python dependency CVE check
        if: steps.scope.outputs.scan_mode == 'full' || steps.scope.outputs.manifests_changed == 'true'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/sarif

          # Packages being audited (explicit list mirrors requirements.txt):
          #   adafruit-python-shell  click
          #   adafruit-blinka  adafruit-circuitpython-rgb-display  spidev
          #   Pillow>=12.2.0  numpy
          echo "=== pip-audit: Python dependency CVE scan ==="
          echo "    Source: requirements.txt"
          echo "    Packages: adafruit-python-shell click adafruit-blinka"
          echo "              adafruit-circuitpython-rgb-display spidev"
          echo "              Pillow>=12.2.0 numpy"

          # Pass 1: SARIF output for Security tab.
          # pip-audit is installed inside the container, not from the repo.
          # Use --output into a writable mounted volume rather than capturing
          # stdout: pip-audit may exit 1 (vulns found) before flushing stdout
          # fully, producing a truncated/empty file. Writing to a file inside
          # the container is atomic from the host's perspective.
          mkdir -p /tmp/pip-audit-output
          docker run --rm \
            -v "${{ github.workspace }}:/repo:ro" \
            -v "/tmp/pip-audit-output:/output" \
            python:3.12-slim \
            sh -c "
              pip install 'pip-audit==2.9.0' \
                  --quiet \
                  --no-cache-dir \
                  --index-url https://pypi.org/simple/ && \
              pip-audit \
                --requirement /repo/requirements.txt \
                --format sarif \
                --output /output/pip-audit.sarif \
                --no-deps \
                --skip-editable" \
          || true
          # '|| true': exit code 1 = vulns found; SARIF still written to
          # /output/pip-audit.sarif before pip-audit exits.

          # Validate the produced SARIF is well-formed JSON; emit a minimal
          # valid empty SARIF if pip-audit failed to produce any output
          # (e.g. network timeout, unresolvable package on this platform).
          if python3 -c \
               "import json,sys; json.load(open('/tmp/pip-audit-output/pip-audit.sarif'))" \
               2>/dev/null; then
            cp /tmp/pip-audit-output/pip-audit.sarif /tmp/sarif/pip-audit.sarif
            echo "pip-audit SARIF validated OK."
          else
            echo "::warning::pip-audit did not produce valid SARIF — writing empty SARIF placeholder."
            printf '{"version":"2.1.0","$schema":"https://raw.githubusercontent.com/oasis-tcs/sarif-spec/master/Documents/CommitteeSpecifications/2.1.0/sarif-schema-2.1.0.json","runs":[{"tool":{"driver":{"name":"pip-audit","version":"2.9.0","rules":[]}},"results":[]}]}' \
              > /tmp/sarif/pip-audit.sarif
          fi

          # Pass 2: human-readable table summary (terminal log).
          echo ""
          echo "=== pip-audit: table summary ==="
          docker run --rm \
            -v "${{ github.workspace }}:/repo:ro" \
            python:3.12-slim \
            sh -c "
              pip install 'pip-audit==2.9.0' \
                  --quiet \
                  --no-cache-dir \
                  --index-url https://pypi.org/simple/ && \
              pip-audit \
                --requirement /repo/requirements.txt \
                --no-deps \
                --skip-editable" \
          || true

      - name: Upload pip-audit SARIF to Security tab
        if: always()
        # REPLACE with verified commit SHA — see pinning note at top.
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: /tmp/sarif/pip-audit.sarif
          category: pip-audit

      # ----------------------------------------------------------------
      # STAGE 3 — malcontent: full behavioral analysis
      #
      # Source code verified from chainguard-dev/malcontent cmd/mal/mal.go:
      #
      #   FLAG PLACEMENT: All control flags (--all, --max-depth, --min-risk,
      #   --format, --output, --third-party, etc.) have Local=false in the
      #   urfave/cli definition. They are GLOBAL flags and MUST be placed
      #   BEFORE the subcommand (analyze / scan / diff).
      #
      #   --all BEHAVIOR (from source):
      #     When --all is set, the source explicitly overrides:
      #       ignoreTags     = []   (no tag filtering — includes all rules)
      #       includeDataFiles = true
      #       minFileRisk    = -1   (show all files)
      #       minRisk        = -1   (show all findings — overrides --min-risk)
      #     CONSEQUENCE: Do NOT combine --all with --min-risk critical for
      #     the CI gate step — --all would override the threshold to "any."
      #     Use --all ONLY for the full analyze/report pass.
      #
      #   --quantity-increases-risk: defaults to true in source. Explicit
      #     flag is included here for clarity but is not strictly required.
      #
      #   EXIT CODE NOTE (from source analysis of ErrMatchedCondition):
      #     The --exit-first-hit flag may return exit code 0 even when a
      #     match is found (ErrMatchedCondition maps to ExitOK). The CI gate
      #     step below uses JSON output + jq for the authoritative check,
      #     with --exit-first-hit as a secondary signal.
      #     Verify behavior: docker run ... scan /your-test-path; echo "exit: $?"
      #
      # Coverage:
      #   14,500+ YARA rules (base). With --third-party:
      #     + Avast, Elastic, FireEye, Mandiant, Nextron, ReversingLabs rules.
      #   Binary formats:  ELF, PE (Windows), Mach-O (macOS), a.out
      #   Source code:     Python, JavaScript/TypeScript, Go, Ruby, PHP,
      #                    Perl, Shell, C/C++, AppleScript
      #   Archives:        .zip, .tar.gz, .whl, .jar, .vsix, and others
      #                    extracted up to --max-depth -1 (unlimited)
      #   Data files:      images, blobs, any non-program file
      #                    (via --include-data-files implied by --all)
      #
      # --third-party licensing note:
      #   Third-party rules (Avast, Elastic, FireEye/Mandiant, Nextron,
      #   ReversingLabs) may have individual licensing restrictions.
      #   Review /third_party/ in the malcontent repo before commercial use.
      #   For open-source / research scanning this is generally acceptable.
      #   Remove --third-party to restrict to the Apache 2.0 base rules.
      #
      # Two passes:
      #   1. analyze — full enumeration, JSON report, no risk threshold cut.
      #   2. scan    — CI gate, CRITICAL threshold, JSON gate file + jq check.
      # ----------------------------------------------------------------
      - name: Pull malcontent Docker image
        shell: bash
        run: |
          docker pull cgr.dev/chainguard/malcontent:latest
          # Log the image digest for reproducibility and audit trail.
          docker inspect cgr.dev/chainguard/malcontent:latest \
            --format '{{index .RepoDigests 0}}' \
            | sed 's/^/Image digest: /'

      # Pass 1: full analyze — all severities, all file types, JSON report.
      # --all is used here (implies --min-risk any, --include-data-files,
      # no tag filtering). The repo is mounted :ro; output goes to /output.
      - name: malcontent — full analyze (all severities, JSON report)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/malcontent-output

          # Build scan targets: scoped (changed files only) or full (/repo).
          if [[ "${{ steps.scope.outputs.scan_mode }}" == "scoped" && \
                -s /tmp/scan-scope/changed_files.txt ]]; then
            mapfile -t _CHANGED < /tmp/scan-scope/changed_files.txt
            MALCONTENT_TARGETS=("${_CHANGED[@]/#//repo/}")
            echo "Scoped: ${#MALCONTENT_TARGETS[@]} target(s)"
          else
            MALCONTENT_TARGETS=("/repo")
          fi
          # Safety fallback: empty array should never happen, but guard anyway.
          [[ "${#MALCONTENT_TARGETS[@]}" -eq 0 ]] && MALCONTENT_TARGETS=("/repo")

          echo "=== malcontent analyze: full behavioral enumeration ==="
          # stdout is redirected to the host-owned file — no /output mount
          # needed. Avoids permission denied from container non-root user.
          docker run --rm \
            --network none \
            -v "${{ github.workspace }}:/repo:ro" \
            cgr.dev/chainguard/malcontent:latest \
            --all \
            --max-depth -1 \
            --quantity-increases-risk \
            --third-party \
            --stats \
            --format json \
            analyze \
            "${MALCONTENT_TARGETS[@]}" \
            > /tmp/malcontent-output/full-analysis.json

          # Human-readable terminal summary of MEDIUM+ findings (informational).
          echo ""
          echo "=== malcontent analyze: terminal summary (MEDIUM+) ==="
          docker run --rm \
            --network none \
            -v "${{ github.workspace }}:/repo:ro" \
            cgr.dev/chainguard/malcontent:latest \
            --all \
            --max-depth -1 \
            --third-party \
            --min-risk medium \
            --format terminal \
            analyze \
            "${MALCONTENT_TARGETS[@]}" || true

      # Convert malcontent full-analysis JSON to SARIF 2.1.0.
      #
      # malcontent has no native SARIF emitter.  This step uses an inline
      # Python converter that understands the FileReport / Behavior schema
      # (verified against pkg/malcontent/malcontent.go):
      #
      #   Top-level JSON: {"Files": {"<path>": <FileReport>}, ...}
      #   FileReport:     {Path, RiskScore, RiskLevel, Behaviors:[...], ...}
      #   Behavior:       {ID, RiskScore, RiskLevel, Description,
      #                    MatchStrings, RuleURL, ReferenceURL, ...}
      #
      # RiskLevel → SARIF level mapping:
      #   CRITICAL → error   (security-severity 9.5)
      #   HIGH     → error   (security-severity 7.5)
      #   MEDIUM   → warning (security-severity 5.0)
      #   LOW      → note    (security-severity 2.0)
      #   (any other / missing) → note
      #
      # Each unique Behavior.ID becomes a SARIF rule.
      # Each (file, behavior) pair becomes a SARIF result pointing to the
      # file at line 1 col 1.  The Security tab shows one alert per result.
      #
      # This step converts full-analysis.json only.  gate-critical.json is
      # converted in a separate step after the CI gate step runs, so both
      # source files exist when each converter step executes.
      - name: Convert malcontent full-analysis JSON to SARIF
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/sarif

          # Script is in .github/scripts/ to avoid YAML heredoc indentation issues.
          python3 .github/scripts/malcontent_sarif.py \
            /tmp/malcontent-output/full-analysis.json \
            /tmp/sarif/malcontent-full.sarif \
            malcontent/full

      - name: Upload malcontent SARIF (full analysis) to Security tab
        if: always()
        # REPLACE with verified commit SHA — see pinning note at top.
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: /tmp/sarif/malcontent-full.sarif
          category: malcontent

      # Pass 2: CI gate — CRITICAL threshold only.
      # IMPORTANT: --all is NOT used here because --all would override
      # --min-risk critical (confirmed in source code). Only --min-risk
      # and explicit --include-data-files are set.
      #
      # The gate-critical.json written here is converted to
      # malcontent-gate.sarif and uploaded under the distinct category
      # 'malcontent-gate'. GitHub allows only one upload-sarif action
      # per category per job; using separate categories for full-analysis
      # and gate results avoids the "only one run per category" error.
      - name: malcontent — CI gate (CRITICAL threshold)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/malcontent-output

          echo "=== malcontent scan: CI gate — CRITICAL threshold ==="

          # Run scan, write JSON, capture exit code separately.
          # --exit-first-hit may exit 0 even on match (see note above).
          # JSON output is the authoritative gate signal.
          # Build scan targets: scoped (changed files only) or full (/repo).
          if [[ "${{ steps.scope.outputs.scan_mode }}" == "scoped" && \
                -s /tmp/scan-scope/changed_files.txt ]]; then
            mapfile -t _CHANGED < /tmp/scan-scope/changed_files.txt
            MALCONTENT_TARGETS=("${_CHANGED[@]/#//repo/}")
          else
            MALCONTENT_TARGETS=("/repo")
          fi
          [[ "${#MALCONTENT_TARGETS[@]}" -eq 0 ]] && MALCONTENT_TARGETS=("/repo")

          GATE_EXIT=0
          # stdout redirected to host-owned file — same pattern as analyze pass.
          docker run --rm \
            --network none \
            -v "${{ github.workspace }}:/repo:ro" \
            cgr.dev/chainguard/malcontent:latest \
            --max-depth -1 \
            --include-data-files \
            --quantity-increases-risk \
            --third-party \
            --min-risk critical \
            --exit-first-hit \
            --format json \
            scan \
            "${MALCONTENT_TARGETS[@]}" \
            > /tmp/malcontent-output/gate-critical.json \
            || GATE_EXIT=$?

          # Primary gate: non-zero exit code (if --exit-first-hit works as
          # documented with non-zero exit).
          if [[ $GATE_EXIT -ne 0 ]]; then
            echo "::error::malcontent CI gate: CRITICAL findings detected (exit $GATE_EXIT)."
            echo "Review artifact 'security-scan-results' → gate-critical.json"
            echo "Review Security tab → malcontent category for annotated findings."
            exit 1
          fi

          # Fallback gate: check JSON file size. An empty scan result
          # produces a minimal/null JSON. Any non-trivial content means
          # findings were emitted.
          if [[ -f /tmp/malcontent-output/gate-critical.json ]]; then
            BYTES=$(wc -c < /tmp/malcontent-output/gate-critical.json 2>/dev/null || echo 0)
            # Threshold: >50 bytes rules out null/empty JSON payloads.
            # Tune this value downward if false negatives are observed.
            if [[ "$BYTES" -gt 50 ]]; then
              echo "::error::malcontent CI gate: gate-critical.json is non-empty ($BYTES bytes)."
              echo "CRITICAL findings detected. Review artifact and Security tab for details."
              cat /tmp/malcontent-output/gate-critical.json
              exit 1
            fi
          fi

          echo "CI gate passed — no CRITICAL findings."
          echo ""
          echo "Note: Tune to --min-risk high for stricter enforcement."
          echo "      HIGH threshold will also catch steganography, exfil,"
          echo "      and obfuscation patterns that fall below CRITICAL."

      # Convert gate-critical.json (written by the CI gate step above) to
      # SARIF so CRITICAL findings appear in the Security tab even when the
      # CI gate trips and the job exits 1.  Runs with 'if: always()'.
      # Uses the same converter logic as the full-analysis step above.
      - name: Convert malcontent gate JSON to SARIF
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/sarif

          # Reuse the converter script from .github/scripts/.
          python3 .github/scripts/malcontent_sarif.py \
            /tmp/malcontent-output/gate-critical.json \
            /tmp/sarif/malcontent-gate.sarif \
            malcontent/gate

      - name: Upload malcontent SARIF (CI gate) to Security tab
        if: always()
        # REPLACE with verified commit SHA — see pinning note at top.
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: /tmp/sarif/malcontent-gate.sarif
          category: malcontent-gate  # distinct from 'malcontent' (full analysis)

      # ----------------------------------------------------------------
      # Upload all scan artifacts (always — including on failure)
      # Includes both raw JSON outputs and the generated SARIF files.
      # ----------------------------------------------------------------
      - name: Upload scan artifacts
        if: always()
        # REPLACE the tag below with the verified commit SHA.
        uses: actions/upload-artifact@v4   # pin to SHA in production
        with:
          name: security-scan-results-${{ github.run_id }}
          path: |
            /tmp/malcontent-output/
            /tmp/sarif/
          retention-days: 90
          if-no-files-found: warn
