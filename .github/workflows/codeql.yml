name: "CodeQL Advanced"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '41 17 * * 0'

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ${{ (matrix.language == 'swift' && 'macos-latest') || 'ubuntu-latest' }}
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
#        - language: c-cpp
#          build-mode: manual
        - language: python
          build-mode: none

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: ${{ matrix.language }}
        build-mode: ${{ matrix.build-mode }}
        # To run the deepest security scans, uncomment the line below:
        # queries: security-extended,security-and-quality
        
    - name: Install Kernel Headers
      if: matrix.build-mode == 'manual'
      run: |
        sudo apt-get update
        sudo apt-get install -y linux-headers-$(uname -r)

    # This step runs AFTER initialization so CodeQL can watch the compilation
    - name: Run manual build steps
      if: matrix.build-mode == 'manual'
      shell: bash
      run: |
        echo "=== COMPILING ST7789 DISPLAY DRIVER ==="
        # We navigate into the folder and run make. 
        # The '|| true' ensures that if it fails due to Raspberry Pi specific 
        # architecture differences, it doesn't crash the whole scan.
        cd st7789_module && make || true
        
        echo "=== COMPILING I2S MIC DRIVER ==="
        cd i2s_mic_module && make || true
        
        echo "=== FINDING C FILES ==="
        find . -name "*.c"
        
        echo "=== ATTEMPTING TO COMPILE ==="
        # Removing '|| true' so we can see the exact compilation errors
        find . -name "*.c" -exec gcc -c {} \;

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
      with:
        category: "/language:${{matrix.language}}"
